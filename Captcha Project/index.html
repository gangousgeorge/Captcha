<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy Captcha</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<h1 class="verify-header">slide to verify you are not a robot</h1>

<!-- 10 tiled eye images -->
<div class="eye-bg">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="captcha-container">
  <div class="slider-container">
    <input type="range" id="captcha-slider" min="0" max="100" value="0">
    <label for="captcha-slider" id="slider-label">(by sliding you consent to give us all your information)</label>
  </div>

  <div class="settings">

    <div class="toggle-row">
      <span>give us access to your children</span>
      <label class="toggle-switch">
        <input type="checkbox" id="opt1" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="toggle-row">
      <span>give us access to your deepest secrets</span>
      <label class="toggle-switch">
        <input type="checkbox" id="opt2" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

    <div class="toggle-row">
      <span>give us access to test neuralink on your brain</span>
      <label class="toggle-switch">
        <input type="checkbox" id="opt3" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>

  </div>
</div>

<!-- Modal -->
<div id="alert-modal" class="modal">
  <div class="modal-content">
    <span id="close-modal">&times;</span>
    <img src="Img/Zuck.webp" alt="Zuck" id="zuck-img">
    <p id="modal-text">i'm afraid i can't do that</p>
  </div>
</div>

<script>
function showModal() {
  document.getElementById('alert-modal').style.display = 'block';
}

window.onload = function () {
  document.getElementById('close-modal').onclick = function () {
    document.getElementById('alert-modal').style.display = 'none';
  };

  window.onclick = function (event) {
    var modal = document.getElementById('alert-modal');
    if (event.target == modal) modal.style.display = 'none';
  };

  ['opt1', 'opt2', 'opt3'].forEach(function (id) {
    var cb = document.getElementById(id);
    cb.addEventListener('change', function () {
      if (!cb.checked) {
        cb.checked = true;
        var img = document.getElementById('zuck-img');
        if (id === 'opt3') {
          img.src = 'Img/elon-musk-ai.jpg';
        } else if (id === 'opt2') {
          img.src = 'Img/hq720.jpg';
        } else {
          img.src = 'Img/Zuck.webp';
        }
        showModal();
      }
    });
  });

  var slider = document.getElementById('captcha-slider');
  slider.addEventListener('input', function () {
    if (slider.value >= 100) {
      document.getElementById('slider-label').textContent =
        'we already had it all but your input is noted :)';
      slider.disabled = true;
    }
  });
};
</script>
</body>
</html>
